version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: attendifai-mysql
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: attendifai-backend
    restart: unless-stopped
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
volumes:
  mysql_data:
